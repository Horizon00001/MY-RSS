<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY-RSS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">MY</div>
      <div>
        <div class="brand-title">MY-RSS</div>
        <div class="brand-subtitle">RSS 阅读工作台</div>
      </div>
    </div>

    <nav class="nav">
      <a href="#/" class="nav-link" data-route="/">文章</a>
      <a href="#/feeds" class="nav-link" data-route="/feeds">源管理</a>
      <a href="#/health" class="nav-link" data-route="/health">健康</a>
    </nav>

    <div class="sidebar-panel">
      <div class="panel-label">快捷操作</div>
      <button class="action-btn primary" id="refreshBtn">刷新 RSS</button>
      <button class="action-btn" id="summaryBtn">补 AI 摘要</button>
      <button class="action-btn" id="exportBtn">导出 OPML</button>
    </div>

    <div class="sidebar-panel compact">
      <div class="panel-label">状态</div>
      <div class="status-row"><span>文章</span><strong id="countArticles">0</strong></div>
      <div class="status-row"><span>活跃源</span><strong id="countFeeds">0</strong></div>
      <div class="status-row"><span>健康源</span><strong id="countActive">0</strong></div>
    </div>
  </aside>

  <main class="main">
    <header class="toolbar">
      <div class="toolbar-left">
        <div class="view-title" id="viewTitle">文章</div>
        <div class="view-hint" id="viewHint">搜索、刷新、查看摘要和原文</div>
      </div>
      <div class="toolbar-right">
        <label class="search">
          <input id="searchInput" type="search" placeholder="搜索标题、摘要、正文">
          <button id="searchBtn">搜索</button>
        </label>
      </div>
    </header>

    <section class="overview" id="overview"></section>

    <section class="content-grid">
      <div class="pane pane-feeds">
        <div class="pane-head">
          <h2>源</h2>
          <span class="pane-sub" id="feedSummary">全部</span>
        </div>
        <div id="feedList" class="feed-list"></div>
      </div>

      <div class="pane pane-list">
        <div class="pane-head">
          <h2>文章</h2>
          <span class="pane-sub" id="articleSummary">等待加载</span>
        </div>
        <div id="articleList" class="article-list"></div>
        <div id="pagination" class="pagination"></div>
      </div>

      <div class="pane pane-detail">
        <div class="pane-head">
          <h2>详情</h2>
          <span class="pane-sub" id="detailSummary">未选择文章</span>
        </div>
        <div id="articleDetail" class="detail-empty">选择一篇文章查看内容、摘要和原文链接。</div>
      </div>
    </section>
  </main>
</div>

<div id="toastHost" class="toast-host"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
